services:
  app:
    build: .
    container_name: bsh-picnic-app
    restart: unless-stopped
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-me-to-something-random}"
      EVENT_CODE: "${EVENT_CODE:-WELLSBULL159}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-picnicadmin2025}"
      UPLOAD_BASE: "/DATA/bsh/picnic-images"
      DB_PATH: "/DATA/bsh/picnic.db"
    volumes:
      # Persist uploads and database on your Fedora host
      # :z adds the SELinux label needed on Fedora/RHEL hosts
      - /DATA/bsh:/DATA/bsh:z
    ports:
      - "127.0.0.1:5000:5000"   # only exposed on loopback; nginx proxies it
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: bsh-picnic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # :z adds the SELinux label needed on Fedora/RHEL hosts
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - app
